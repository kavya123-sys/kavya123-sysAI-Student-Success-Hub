<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Student Success Hub</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="background"></div>

<header>
<h1>🚀 AI Student Success Hub</h1>
<p>Your AI-powered companion from college to career.</p>
</header>

<section class="glass">

<h2>AI Career Coach</h2>

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="skills" placeholder="Skills (HTML, CSS, Python etc.)">

<input type="text" id="goal" placeholder="Career Goal">

<button onclick="analyzeCareer()">
Analyze Career
</button>

<div id="careerResult"></div>

</section>

<section class="glass">

<h2>Career DNA Analysis</h2>

<canvas id="careerChart"></canvas>

</section>

<section class="glass">

<h2>AI Semester Roadmap</h2>

<select id="semester">
<option>Semester 3</option>
<option>Semester 4</option>
<option>Semester 5</option>
<option>Semester 6</option>
</select>

<button onclick="generateRoadmap()">
Generate Roadmap
</button>

<div id="roadmap"></div>

</section>

<section class="glass">

<h2>AI Project Generator</h2>

<select id="projectTech">

<option>Web Development</option>
<option>AI/ML</option>
<option>Cyber Security</option>
<option>Cloud Computing</option>

</select>

<button onclick="generateProject()">
Generate Project
</button>

<div id="projectOutput"></div>

</section>

<section class="glass">

<h2>Career Readiness Score</h2>

<div class="score-circle">
<span id="score">0%</span>
</div>

</section>

<footer>
Created By Kavya Mehta | ICT Department
</footer>

<script src="script.js"></script>

</body>
</html>
